<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Shop - Premium Panel</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px 0; font-size: 26px; font-weight: 800; color: #007bff; letter-spacing: 1px; }
        
        /* Düymə qrupları */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 25px 15px; text-align: center; text-decoration: none; color: white; transition: 0.3s; }
        .card:active { transform: scale(0.95); background: #222; }
        .card img { width: 45px; height: 45px; margin-bottom: 10px; }
        .card h3 { margin: 5px 0; font-size: 14px; font-weight: 500; }

        /* Alt menyu barı */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; padding: 15px 0; padding-bottom: 25px; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        
        /* Ortadakı + Butonu */
        .add-btn { background: #007bff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; font-weight: bold; border: 4px solid #000; margin-top: -40px; box-shadow: 0 4px 15px rgba(0,123,255,0.4); text-decoration: none; }
    </style>
</head>
<body>

<div class="header">ZIYADOV SHOP</div>

    </a>
    <a href="https://t.me/ziyadov_admin" class="card">
        <img src="https://e7.pngegg.com/pngimages/514/774/png-clipart-pubg-mobile-game-logo-pubg-mobile-logo-games-thumbnail.png">
        <h3>PUBG xidmətləri</h3>
    </a>
    <a href="https://t.me/ziyadov_admin" class="card">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg">
        <h3>TikTok xidmətləri</h3>
