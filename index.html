<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Panel | Professional SMM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff9800; --bg: #0b0b0b; --card: #161616; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Üst Panel */
        .top-bar { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-weight: 800; color: var(--primary); font-size: 20px; }
        .balance-box { background: #252525; padding: 5px 12px; border-radius: 20px; font-size: 13px; border: 1px solid var(--primary); }

        /* Gmail Giriş Modalı (Görünüş üçün) */
        .auth-notice { background: #222; margin: 15px; padding: 15px; border-radius: 10px; text-align: center; border: 1px dashed #444; }
        .gmail-btn { background: white; color: black; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; display: inline-block; margin-top: 10px; }

        /* Xidmət Kartları */
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .service-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .service-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .service-card i { font-size: 35px; color: var(--primary); margin-bottom: 10px; }
        .service-card h3 { font-size: 14px; margin: 5px 0; }

        /* Alt Menyu (Dolph Game Stil) */
        .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; align-items: center; padding: 10px 0 25px 0; border-top: 1px solid #333; }
        .nav-link { color: #777; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-link.active { color: var(--primary); }
        
        /* İdarəetmə (+) Düyməsi */
        .admin-plus { background: var(--primary); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 24px; margin-top: -35px; border: 5px solid var(--bg); box-shadow: 0 0 15px rgba(255,152,0,0.4); }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">ZIYADOV PANEL</div>
    <div class="balance-box">Balans: 0.00 AZN</div>
</div>

<div class="auth-notice">
    <span>Xidmətlərdən yararlanmaq üçün daxil olun</span><br>
    <a href="#" class="gmail-btn"><i class="fab fa-google"></i> Gmail ilə giriş</a>
</div>

<div class="container">
    <div class="grid">
        <div class="service-card" onclick="alert('Instagram xidmətləri bölməsi hazırlanır...')">
            <i class="fab fa-instagram"></i>
            <h3>Instagram</h3>
        </div>
        <div class="service-card" onclick="alert('TikTok xidmətləri bölməsi hazırlanır...')">
            <i class="fab fa-tiktok"></i>
            <h3>TikTok</h3>
        </div>
        <div class="service-card" onclick="alert('PUBG UC bölməsi hazırlanır...')">
            <i class="fas fa-mobile-alt"></i>
            <h3>PUBG Mobile</h3>
        </div>
        <div class="service-card" onclick="alert('Balans artırma sistemi üçün Telegram-a yazın.')">
            <i class="fas fa-wallet"></i>
            <h3>Balans Artır</h3>
        </div>
    </div>
</div>

<nav class="footer-nav">
    <a href="#" class="nav-link active"><i class="fas fa-home"></i>Ana Səhifə</a>
    <a href="#" class="nav-link"><i class="fas fa-th-large"></i>Kateqoriya</a>
    <a href="https://github.com/aziyadov16-prog/ziyadovshop/edit/main/index.html" class="admin-plus"><i class="fas fa-plus"></i></a>
    <a href="#" class="nav-link"><i class="fas fa-shopping-basket"></i>Sifarişlər</a>
    <a href="#" class="nav-link"><i class="fas fa-user"></i>Profil</a>
</nav>

</body>
</html>
