<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid #ff9800; margin-bottom: 20px; }
        .product-card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .info h3 { margin: 0; font-size: 16px; color: #ff9800; }
        .info p { margin: 5px 0 0; font-size: 12px; color: #aaa; }
        .price { font-weight: bold; font-size: 17px; color: #fff; margin-right: 10px; }
        .buy-btn { background: #ff9800; color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .buy-btn:active { transform: scale(0.9); }
        .category-title { font-size: 14px; color: #ff9800; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">ZİYADOV SHOP 🛍️</h2>
    <p style="font-size: 12px; color: #888;">Keyfiyyətin tək ünvanı</p>
</div>

<div class="category-title">Premium Hesablar</div>
<div class="product-card">
    <div class="info"><h3>Netflix Premium</h3><p>4K UHD / 1 Aylıq</p></div>
    <div class="price">3.50 AZN</div>
    <button class="buy-btn" onclick="sendOrder('Netflix Premium')">AL</button>
</div>

<div class="product-card">
    <div class="info"><h3>Spotify Premium</h3><p>Şəxsi Hesab / 1 Aylıq</p></div>
    <div class="price">2.00 AZN</div>
    <button class="buy-btn" onclick="sendOrder('Spotify Premium')">AL</button>
</div>

<div class="category-title">Oyun Xidmətləri</div>
<div class="product-card">
    <div class="info"><h3>PUBG 60 UC</h3><p>Anında Yükləmə</p></div>
    <div class="price">1.70 AZN</div>
    <button class="buy-btn" onclick="sendOrder('60 UC')">AL</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.MainButton.setText("MAĞAZADAN ÇIX");
    tg.MainButton.show();
    tg.MainButton.onClick(() => tg.close());

    function sendOrder(item) {
        tg.sendData("Sifariş: " + item);
        tg.close();
    }
</script>

</body>
</html>
