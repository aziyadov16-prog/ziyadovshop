<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Shop</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 20px; }
        .header { background: #007bff; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: #333; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 60px; height: 60px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0; font-size: 16px; }
        .btn { background: #007bff; color: white; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">Ziyadov Shop</div>
    <div class="grid">
        <a href="https://t.me/ziyadov_admin" class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg">
            <h3>Instagram</h3>
            <div class="btn">Sifariş Et</div>
        </a>
        <a href="https://t.me/ziyadov_admin" class="card">
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg">
            <h3>TikTok</h3>
            <div class="btn">Sifariş Et</div>
        </a>
    </div>
</body>
</html>
